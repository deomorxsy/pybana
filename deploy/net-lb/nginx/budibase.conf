# Budibase

server {
    server_name ${{ secrets.OLD_BDB_HOST }}

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_pass http://localhost:10000;
    }

    client_max_body_size 50m;

    listen 443 ssl; # managed by either Certbot OR k8s' cert-manager
    ssl_certificate /etc/letsencrypt/live/${{ secrets.OLD_BDB_HOST }}/fullchain.pem; # managed by either Certbot OR k8s' cert-manager
    ssl_certificate_key /etc/letsencrypt/live/OLD_BDB_HOST/privkey.pem; # managed by either Certbot OR k8s' cert-manager
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by either Certbot OR k8s' cert-manager
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by either Certbot OR k8s' cert-manager

}



server {
    if ($host = ${{ secrets.OLD_BDB_HOST }}) {
        return 301 https://$host$request_uri;
    } # managed by either Certbot OR k8s' cert-manager


    listen 80;
    server_name ${{ secrets.OLD_BDB_HOST }};
    return 404; # managed by either Certbot OR k8s' cert-manager


global:
  lineage:
    enabled: true
  security:
    oauth2:
      audiences:
      clientId:
      clientSecret:
      issuerUri:
  logAggregation:
    enabled: false
    loki:
      enabled: false
      url: http://ilum-loki-gateway
    promtail:
      enabled: false

ilum-core:
  enabled: true
  image: "ilum/core:6.3.2"
  replicaCount: 1
  mongo:
    uri: mongodb://ilum-mongodb-0.ilum-mongodb-headless:27017,ilum-mongodb-1.ilum-mongodb-headless:27017/ilum-default?replicaSet=rs0
  minio:
    statusProbe:
      enabled: true
      baseUrl: "http://ilum-minio:9000"
      image: curlimages/curl:8.5.0
  communication:
    type: "grpc"
  kafka:
    address: "ilum-kafka-controller-0.ilum-kafka-controller-headless:9092"
  kubernetes:
    defaultCluster:
      config:
        spark.hadoop.fs.s3a.bucket.ilum-data.impl: "org.apache.hadoop.fs.s3a.S3AFileSystem"
        spark.hadoop.fs.s3a.bucket.ilum-data.endpoint: "http://ilum-minio:9000"
        spark.hadoop.fs.s3a.bucket.ilum-data.region: "us-east-1"
        spark.hadoop.fs.s3a.bucket.ilum-data.access.key: "minioadmin"
        spark.hadoop.fs.s3a.bucket.ilum-data.secret.key: "minioadmin"
        spark.hadoop.fs.s3a.bucket.ilum-data.path.style.access: "true"
        spark.hadoop.fs.s3a.bucket.ilum-data.fast.upload: "true"
        spark.hadoop.fs.s3a.aws.credentials.provider: "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"
        spark.sql.warehouse.dir: "s3a://ilum-data/"
    initClusterOnStartup: "true"
    upgradeClusterOnStartup: "false"
    api:
      url: "https://kubernetes.default.svc"
    container:
      image: "ilum/spark:3.5.3-delta"
    storage:
      type: "s3"
    s3:
      host: "ilum-minio"
      region: "us-east-1"
      port: 9000
      sparkBucket: ilum-files
      dataBucket: ilum-tables
      extraBuckets:
        - ilum-mlflow
        - ilum-data
      accessKey: "minioadmin"
      secretKey: "minioadmin"
    gcs:
      clientEmail: ""
      sparkBucket: ilum-files
      dataBucket: ilum-tables
      privateKey: ""
      privateKeyId: ""
    wasbs:
      accountName: ""
      accessKey: ""
      sparkContainer: ilum-files
      dataContainer: ilum-tables
    hdfs:
      hadoopUsername: "hdfs"
      config: []
      sparkCatalog: ilum-files
      dataCatalog: ilum-tables
      keyTab: ""
      principal: ""
      krb5: ""
      trustStore: ""

  security:
    type: "internal"
    internal:
      users:
        - username: "admin"
          initialPassword: "admin"
          roles:
            - "ADMIN"
    ldap:
      urls:
      base: ""
      username: ""
      password: ""
      passwordEncoder: "adaptive"
      userMapping:
        base: ""
        filter: "uid={0}"
        passwordAttr: "userPassword"
      groupMapping:
        base: ""
        filter: "(member={0})"
        memberAttribute: "uid"
        name: "cn"
    oauth2:
      mapping:
        id: ""
        name: "sub"
        email: "email"
        fullname: "fullname"
        description: ""
        department: ""
        groups: "groups"
        roles: "roles"
        singleGroup: ""
        singleRole: ""
        enabled: ""
        enabledTrue: ""
    jwt:
      issuerUri: "https://ilum.cloud"
      timeToLive: "8h"
      publicKey: ""
      privateKey: ""
    authorities:
      roles:
        prefix: "ROLE_"
        claimName: "groups"
        # mappings:
        #   administrators: admin
        #   managers: user
      scopes:
        prefix: "SCOPE_"
        claimName: "scp"
        # mappings:
    trustStore:
      enabled: false
      secretName: "tls-secret"
      caSecretFileName: "ca.crt"
      password: "CHANGEMEPLEASE"
    keyStore:
      enabled: false
      secretName: "tls-secret"
      secretFileName: "keystore.p12"
      password: "CHANGEMEPLEASE"

  historyServer:
    enabled: true

  job:
    retain:
      hours: 168
    openLineage:
      transport:
        type: http
        serverUrl: http://ilum-marquez:9555
        endpoint: /external/lineage/api/v1/lineage
    prometheus:
      enabled: true
    graphite:
      enabled: false
      host: "ilum-graphite-graphite-tcp"
      port: 9109
      period: 10
      unit: seconds
    healthcheck:
      enabled: true
      interval: 300
      tolerance: 3600
    memorysettings:
      executors: 2
      executorMemory: 1g
      driverMemory: 1g
      executorCores: 1
      driverCores: 1
      dynamicAllocationEnabled: false
      minExecutors: 0
      initialExecutors: 0
      maxExecutors: 20

  hiveMetastore:
    enabled: false
    address: thrift://ilum-hive-metastore:9083
    version: 3.1.3
    warehouseDir: s3a://ilum-data/

  nodeSelector: {}
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64
            - arm64

ilum-ui:
  enabled: true
  image: "ilum/ui:6.3.2"
  replicaCount: 1
  runtimeVars:
    defaultConfigMap:
      enabled: false
  nginx:
    config:
      enabled: false
      extraLocation: ""
      default: true
      custom: ""

  nodeSelector: {}
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64
            - arm64

ilum-livy-proxy:
  enabled: true
  image: "ilum/livy-proxy:6.3.2"
  client:
    endpoint:
      ilum: "http://ilum-core:9888/api/v1"
  ilumUI:
    publicEndpoint: "http://localhost:9777"

  nodeSelector: {}
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64
            - arm64

mongodb:
  enabled: true
  image:
    registry: docker.io
    repository: ilum/mongodb
    tag: 6.0.5
  fullnameOverride: "ilum-mongodb"
  architecture: "replicaset"
  auth:
    enabled: false
  volumePermissions:
    enabled: true
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64
            - arm64

kafka:
  enabled: false
  extraConfig: |
    auto.create.topics.enable=false
    message.max.bytes=20000000
  fullnameOverride: "ilum-kafka"
  listeners:
    client:
      protocol: PLAINTEXT
  controller:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/arch
              operator: In
              values:
              - amd64
              - arm64

minio:
  enabled: true
  extraEnvVars: |
    - name: MINIO_BROWSER_REDIRECT_URL
      value: "http://ilum-minio:9001/external/minio/"
  fullnameOverride: "ilum-minio"
  defaultBuckets: "ilum-files, ilum-data, ilum-tables, ilum-mlflow"
  auth:
    rootUser: "minioadmin"
    rootPassword: "minioadmin"
  persistence:
    size: 16Gi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64
            - arm64

ilum-jupyter:
  enabled: true
  image: "ilum/sparkmagic:0.23.1"
  livyEndpoint: "http://ilum-livy-proxy:8998"
  git:
    enabled: true
    username: ilum
    password: ilum
    email: ilum@ilum
    repository: jupyter
    address: "ilum-gitea-http:3000"

  nodeSelector: {}
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64
            - arm64

ilum-zeppelin:
  enabled: false
  fullnameOverride: "ilum-zeppelin"
  image: "apache/zeppelin:0.10.1"
  livyEndpoint: "http://ilum-livy-proxy:8998"

  nodeSelector: {}
  tolerations: []
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64

airflow:
  enabled: false
  fullnameOverride: "ilum-airflow"
  useStandardNaming: true
  images:
    airflow:
      repository: "ilum/airflow"
      tag: 2.9.3
  executor: "LocalKubernetesExecutor"
  extraEnv: |
    - name: AIRFLOW__API__AUTH_BACKENDS
      value: "airflow.api.auth.backend.default"
    - name: MINIO_USERNAME
      value: "minioadmin"
    - name: MINIO_PASSWORD
      value: "minioadmin"
    - name: MINIO_ENDPOINT
      value: "http://ilum-minio:9000"
  data:
    metadataConnection:
      user: postgres
      pass: "CHANGEMEPLEASE"
      protocol: postgresql
      host: "ilum-postgresql-hl"
      port: 5432
      db: airflow
      sslmode: disable
  webserverSecretKey: "CHANGE ME PLEASE!"
  scheduler:
    args: ["bash", "-c", "exec /opt/airflow/ilum-connection-create.sh & airflow scheduler"]
  migrateDatabaseJob:
    useHelmHooks: false
  triggerer:
    enabled: false
  statsd:
    enabled: false
  redis:
    enabled: false
    serviceAccount:
      create: false
  postgresql:
    enabled: false
  config:
    webserver:
      base_url: "http://ilum-airflow-webserver:8080/external/airflow"
    logging:
      remote_logging: "True"
      remote_base_log_folder: s3://ilum-data/airflow/logs
      encrypt_s3_logs: False
      remote_log_conn_id: ilum-minio
  dags:
    gitSync:
      enabled: true
      repo: "http://ilum-gitea-http:3000/ilum/airflow.git"
      branch: master
      ref: HEAD
      depth: 1
      maxFailures: 0
      subPath: ""
      credentialsSecret: ilum-git-credentials
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/arch
            operator: In
            values:
            - amd64
            - arm64

superset:
  enabled: false
  protocol: "http"
  redis:
    serviceAccount:
      create: false
  fullnameOverride: "ilum-superset"
  image:
    repository: ilum/superset
    tag: 4.1.2
  extraEnv:
    SUPERSET_APP_ROOT: "/external/superset"
  extraSecretEnv:
    SUPERSET_SECRET_KEY: "CHANGEMEPLEASE"
  postgresql:
    enabled: false
  supersetNode:
    livenessProbe:
      httpGet:
        path: "/external/superset/health"
    readinessProbe:
      httpGet:
        path: "/external/superset/health"
    startupProbe:
      httpGet:
        path: "/external/superset/health"
    connections:
        db_host: "ilum-postgresql-hl"
        db_port: "5432"
        db_user: ilum
        db_pass: "CHANGEMEPLEASE"
        db_name: superset
  configOverrides:
    ilum_extra_config: |
      ENABLE_PROXY_FIX = True
      PROXY_FIX_CONFIG = {"x_for": 1, "x_proto": 1, "x_host": 0, "x_port": 0, "x_prefix": 1}
  extraConfigs:
    import_datasources.yaml: |
      databases:
      - database_name: Ilum-SQL
        sqlalchemy_uri: "hive://ilum-superset@ilum-sql-thrift-binary:10009/default"
        expose_in_sqllab: true
        allow_run_async: false
        allow_ctas: true
        allow_cvas: true
        allow_dml: true
        allow_csv_upload: false
      - database_name: Ilum-SQL-Trino
        sqlalchemy_uri: "trino://ilum@ilum-trino:8080/ilum-delta"
        expose_in_sqllab: true
        allow_run_async: false
        allow_ctas: true
        allow_cvas: true
        allow_dml: true
        allow_csv_upload: false
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
                  - arm64

mlflow:

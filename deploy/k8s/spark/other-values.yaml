  postgresql:
    image: "bitnami/postgresql:16"
    host: "ilum-postgresql-hl"
    port: 5432
    database: metastore
    auth:
      username: ilum
      password: "CHANGEMEPLEASE"

  storage:
    metastore:
      warehouse: "s3a://ilum-data/"
    type: "s3"
    s3:
      host: "ilum-minio"
      port: 9000
      accessKey: "minioadmin"
      secretKey: "minioadmin"
    gcs:
      clientEmail: ""
      privateKey: ""
      privateKeyId: ""
    wasbs:
      accountName: ""
      accessKey: ""
    hdfs:
      hadoopUsername: "hdfs"
      config: []

loki:
  nameOverride: ilum-loki
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
      lokiCanary:
        enabled: false
  test:
    enabled: false
  loki:
    auth_enabled: false
    storage:
      bucketNames:
        chunks: ilum-files
        ruler: ilum-files
        admin: ilum-files
      type: s3
      s3:
        endpoint: http://ilum-minio:9000
        region: us-east-1
        secretAccessKey: minioadmin
        accessKeyId: minioadmin
        s3ForcePathStyle: true
        insecure: true
    compactor:
      retention_enabled: true
      deletion_mode: filter-and-delete
      shared_store: s3
    limits_config:
      allow_deletes: true

promtail:
  config:
    clients:
      - url: http://ilum-loki-write:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - match:
            selector: '{ilum_logAggregation!="true"}'
            action: drop
            drop_counter_reason: non_ilum_log
      extraRelabelConfigs:
        - action: labelmap
          regex: "__meta_kubernetes_pod_label_ilum(.*)"
          replacement: "ilum${1}"
        - action: labelmap
          regex: "__meta_kubernetes_pod_label_spark(.*)"
          replacement: "spark${1}"

      scrapeConfigs: |
        - job_name: kubernetes-pods
          pipeline_stages:
            {{- toYaml .Values.config.snippets.pipelineStages | nindent 4 }}
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                - {{ .Release.Namespace }}
          relabel_configs:
            - source_labels:
                - __meta_kubernetes_pod_controller_name
              regex: ([0-9a-z-.]+?)(-[0-9a-f]{8,10})?
              action: replace
              target_label: __tmp_controller_name
            - source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_name
                - __meta_kubernetes_pod_label_app
                - __tmp_controller_name
                - __meta_kubernetes_pod_name
              regex: ^;*([^;]+)(;.*)?$
              action: replace
              target_label: app
            - source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_instance
                - __meta_kubernetes_pod_label_instance
              regex: ^;*([^;]+)(;.*)?$
              action: replace
              target_label: instance
            - source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_component
                - __meta_kubernetes_pod_label_component
              regex: ^;*([^;]+)(;.*)?$
              action: replace
              target_label: component
            {{- if .Values.config.snippets.addScrapeJobLabel }}
            - replacement: kubernetes-pods
              target_label: scrape_job
            {{- end }}
            {{- toYaml .Values.config.snippets.common | nindent 4 }}
            {{- with .Values.config.snippets.extraRelabelConfigs }}
            {{- toYaml . | nindent 4 }}
            {{- end }}


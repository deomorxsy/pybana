graphite-exporter:
  fullnameOverride: "ilum-graphite"
  graphite:
    enabled: false
    mapping: |
      mappings:
        - match: '(.+?)\.(.+?)\.(.+?)\.(.+?)\.(.+?)\.(\bcount\b|\bm15_rate\b|\bm1_rate\b|\bm5_rate\b|\bmax\b|\bmean\b|\bmean_rate\b|\bmin\b|\bp50\b|\bp75\b|\bp95\b|\bp98\b|\bp99\b|\bp999\b|\bstddev\b)'
          match_type: regex
          name: "metrics_executor_${4}_${5}"
          labels:
            application_id: "${2}"
            application_name: "${1}"
            executor_id: "${3}"
            stat: "${6}"
        - match: '(.+?)\.(.+?)\.(.+?)\.(.+?)\.(.+?)\.(.+)'
          match_type: regex
          name: "metrics_executor_${4}_${5}_${6}"
          labels:
            application_id: "${2}"
            application_name: "${1}"
            executor_id: "${3}"
        - match: '(.*)\.(.*)\.(.*)\.(.*)\.(.*)'
          match_type: regex
          name: "metrics_executor_${4}_${5}"
          labels:
            application_id: "${2}"
            application_name: "${1}"
            executor_id: "${3}"

gitea:
  enabled: true
  fullnameOverride: ilum-gitea
  image:
    rootless: false
  initPreScript: "while ! nc -z ilum-postgresql-hl 5432 2>/dev/null; do echo 'Waiting for Postgres...'; sleep 5; done; echo 'Postgres is ready!'"
  gitea:
    config:
      database:
        DB_TYPE: postgres
        HOST: "ilum-postgresql-hl:5432"
        NAME: gitea
        USER: ilum
        PASSWD: "CHANGEMEPLEASE"
    admin:
      existingSecret: ilum-git-credentials
      email: ilum@ilum
      passwordMode: initialOnlyNoReset
    additionalConfigFromEnvs:
      - name: GITEA__REPOSITORY__ENABLE_PUSH_CREATE_USER
        value: "true"
      - name: GITEA__REPOSITORY__ENABLE_PUSH_CREATE_ORG
        value: "true"
      - name: GITEA__REPOSITORY__DEFAULT_BRANCH
        value: "master"
      - name: GITEA__SERVER__ROOT_URL
        value: "http://git.example.com/external/gitea/"
      - name: GITEA__SERVER__STATIC_URL_PREFIX
        value: "/external/gitea/"
  redis-cluster:
    enabled: false
  redis:
    enabled: false
  postgresql:
    enabled: false
  postgresql-ha:
    enabled: false

trino:
